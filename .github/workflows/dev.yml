name: Dev

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            clang

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  bundles:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            clang \
            jq

      - run: npm ci
      - run: npm run tauri build

      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: |
            target/release/bundle/deb/*.deb
            target/release/bundle/rpm/*.rpm

  archpkg:
    needs: bundles
    runs-on: ubuntu-24.04
    container: archlinux:latest
    steps:
      - run: pacman -Syu --noconfirm --needed base-devel

      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          name: bundles
          path: bundles

      - name: Build and smoke-test sink-bin
        run: |
          set -euo pipefail
          deb=$(find bundles -name 'sink_*_amd64.deb' | head -1)
          ver=$(basename "$deb" | sed 's/^sink_//; s/_amd64\.deb$//')
          useradd -m builder
          install -d -o builder /build
          cp "$deb" "/build/sink_${ver}_amd64.deb"
          sum=$(sha256sum "/build/sink_${ver}_amd64.deb" | cut -d' ' -f1)
          cp packaging/arch/PKGBUILD /build/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${ver}/; s/^sha256sums=.*/sha256sums=('${sum}')/" /build/PKGBUILD
          chown -R builder:builder /build
          sudo -u builder bash -lc 'cd /build && makepkg --noconfirm --nodeps'
          pkg=$(ls /build/sink-bin-*-x86_64.pkg.tar.zst)
          pacman -U --noconfirm "$pkg" >/dev/null
          pacman -S --noconfirm --needed xorg-server-xvfb mesa >/dev/null
          timeout 25 xvfb-run -a /usr/bin/sink >/tmp/launch.log 2>&1 || true
          if grep -q 'panicked at' /tmp/launch.log; then
            echo "::error::sink panics on launch"
            cat /tmp/launch.log
            exit 1
          fi
          cp "$pkg" "$GITHUB_WORKSPACE/"

      - uses: actions/upload-artifact@v4
        with:
          name: sink-bin
          path: sink-bin-*-x86_64.pkg.tar.zst
