name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    # 24.04: PipeWire 1.x headers (the native backend needs >= 0.3.49)
    # and webkit2gtk-4.1 for Tauri v2.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            clang \
            squashfs-tools \
            zstd

      - run: npm ci

      - name: Build bundles
        run: npm run tauri build

      - name: Repack AppImage against system PipeWire
        # linuxdeploy bundles the build machine's libpipewire, which has
        # its SPA plugin directory baked in at the distro's path — on any
        # other distro it can't load support.system and the native backend
        # dies. PipeWire is a hard runtime requirement anyway, so strip the
        # bundled copy and let the loader use the system library.
        run: |
          set -euo pipefail
          cd src-tauri/target/release/bundle/appimage
          app=$(ls sink_*.AppImage)
          ./"$app" --appimage-extract > /dev/null
          rm -fv squashfs-root/usr/lib/libpipewire-0.3.so*
          offset=$(./"$app" --appimage-offset)
          head -c "$offset" "$app" > runtime
          mksquashfs squashfs-root payload.squashfs -root-owned -noappend -quiet -comp zstd
          cat runtime payload.squashfs > "$app"
          chmod +x "$app"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" --title "Sink $tag" --notes "Linux builds:
          - **AppImage** — portable, run anywhere (\`chmod +x\` and go)
          - **.deb** — Debian / Ubuntu and derivatives
          - **.rpm** — Fedora / openSUSE and derivatives

          Requires PipeWire with \`pipewire-pulse\` and WirePlumber 0.5+." || true
          gh release upload "$tag" --clobber \
            src-tauri/target/release/bundle/appimage/sink_*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/rpm/*.rpm
