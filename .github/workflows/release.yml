name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:
    inputs:
      version:
        description: "Stable version to publish, e.g. 0.1.20. Leave blank to publish a dev prerelease."
        required: false
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: .

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            clang \
            squashfs-tools \
            zstd \
            jq

      - name: Determine release
        # A version input (manual dispatch) cuts a stable vX.Y.Z; anything
        # else (every push to main) refreshes the rolling `dev` prerelease,
        # versioned as the next patch so it previews the upcoming release.
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          input="$INPUT_VERSION"
          if [ -n "$input" ]; then
            # Stable release: validate the input rather than trusting it. An
            # unchecked value yields tags like `vv0.1.20` and unfindable
            # artifacts, and a dispatch from a feature branch would tag
            # unreviewed code.
            if [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "::error::stable releases must be dispatched from main (got $GITHUB_REF)"
              exit 1
            fi
            if [[ ! "$input" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::version must be X.Y.Z (got '$input')"
              exit 1
            fi
            if git rev-parse "v$input" >/dev/null 2>&1; then
              echo "::error::tag v$input already exists"
              exit 1
            fi
            ver="$input"; tag="v$ver"; pre=false
          else
            latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
            latest=${latest#v}; latest=${latest:-0.0.0}
            IFS=. read -r ma mi pa <<< "$latest"
            ver="$ma.$mi.$((pa + 1))"; tag="dev"; pre=true
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$pre" >> "$GITHUB_OUTPUT"
          echo "Publishing $tag (version $ver, prerelease=$pre)"

      - name: Stamp version into the build
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          jq --arg v "$ver" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          npm pkg set version="$ver"
          # Keep the crate version in step so CARGO_PKG_VERSION (crash reports,
          # --version, package metadata) matches the release instead of 0.1.0.
          sed -i '0,/^version = /{s/^version = .*/version = "'"$ver"'"/}' src-tauri/Cargo.toml

      - run: npm ci

      - name: Verify (never publish untested code)
        run: |
          npx tsc --noEmit
          npm test
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build bundles
        run: npm run tauri build

      - name: Repack AppImage against system PipeWire
        # Strip the bundled libpipewire so the loader uses the system one.
        run: |
          set -euo pipefail
          cd "$(dirname "$(find target -path '*/release/bundle/appimage/sink_*.AppImage' | head -1)")"
          app=$(ls sink_*.AppImage)
          ./"$app" --appimage-extract > /dev/null
          rm -fv squashfs-root/usr/lib/libpipewire-0.3.so*
          offset=$(./"$app" --appimage-offset)
          head -c "$offset" "$app" > runtime
          mksquashfs squashfs-root payload.squashfs -root-owned -noappend -quiet -comp zstd
          cat runtime payload.squashfs > "$app"
          chmod +x "$app"

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.ver.outputs.tag }}"
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
            gh release create "$tag" --target "$GITHUB_SHA" --title "Dev build" --prerelease \
              --notes "Rolling development build from the latest commit on main. Not a stable release - expect rough edges."
          else
            gh release create "$tag" --target "$GITHUB_SHA" --title "Sink $tag" \
              --generate-notes --notes "Linux builds:
          - **AppImage** - portable, run anywhere (\`chmod +x\` and go)
          - **.deb** - Debian / Ubuntu and derivatives
          - **.rpm** - Fedora / openSUSE and derivatives
          - **.pkg.tar.zst** - Arch (\`sudo pacman -U\`)

          Requires PipeWire with \`pipewire-pulse\` and WirePlumber 0.5+."
          fi
          # Checksums over what this job builds, by basename, so users can
          # verify downloads. The Arch package is built later and appends its
          # own line (see the archpkg job).
          ( cd target/release/bundle
            sha256sum appimage/sink_*.AppImage deb/*.deb rpm/*.rpm \
              | awk '{ n=$2; sub(/.*\//, "", n); print $1"  "n }' \
              > "$GITHUB_WORKSPACE/SHA256SUMS" )
          gh release upload "$tag" --clobber \
            "$GITHUB_WORKSPACE/SHA256SUMS" \
            target/release/bundle/appimage/sink_*.AppImage \
            target/release/bundle/deb/*.deb \
            target/release/bundle/rpm/*.rpm

  archpkg:
    name: Arch package
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    container: archlinux:latest
    steps:
      - name: Install build tooling
        # openssh: git's ssh:// transport for the AUR push (not in base-devel).
        run: pacman -Syu --noconfirm --needed base-devel git github-cli openssh

      - uses: actions/checkout@v7

      - name: Build and attach sink-bin
        env:
          VER: ${{ needs.build.outputs.version }}
          TAG: ${{ needs.build.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          useradd -m builder
          install -d -o builder /build
          deb="sink_${VER}_amd64.deb"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern "$deb" --dir /build
          sum=$(sha256sum "/build/$deb" | cut -d' ' -f1)
          cp packaging/arch/PKGBUILD /build/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VER}/; s/^sha256sums=.*/sha256sums=('${sum}')/" /build/PKGBUILD
          chown -R builder:builder /build
          sudo -u builder bash -lc 'cd /build && makepkg --noconfirm --nodeps'
          pkg=$(ls /build/sink-bin-*-x86_64.pkg.tar.zst)
          # Smoke test: install and launch headlessly. A healthy tray app runs
          # until timeout kills it (exit 124); an earlier exit means a missing
          # runtime dep (loader abort), a tray/webkit init failure, or a panic.
          pacman -U --noconfirm "$pkg" >/dev/null
          pacman -S --noconfirm --needed xorg-server-xvfb mesa >/dev/null
          set +e
          timeout 25 xvfb-run -a /usr/bin/sink >/tmp/launch.log 2>&1
          code=$?
          set -e
          cat /tmp/launch.log || true
          if grep -qiE 'panicked at|error while loading shared libraries|cannot open shared object|symbol lookup error' /tmp/launch.log; then
            echo "::error::sink failed to start cleanly - not publishing"
            exit 1
          fi
          if [ "$code" -ne 124 ]; then
            echo "::error::sink exited early (code $code) instead of staying alive - not publishing"
            exit 1
          fi
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "$pkg"
          # Append the Arch package checksum to the release SHA256SUMS.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --pattern SHA256SUMS --dir /tmp 2>/dev/null || true
          echo "$(sha256sum "$pkg" | cut -d' ' -f1)  $(basename "$pkg")" >> /tmp/SHA256SUMS
          gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber /tmp/SHA256SUMS

      - name: Publish sink-bin to the AUR
        # Stable releases only - never the rolling dev prerelease. Best effort:
        # the .pkg.tar.zst is already on the release, so an AUR failure here
        # must not fail the run (it surfaces as a warning instead).
        if: needs.build.outputs.prerelease == 'false'
        env:
          VER: ${{ needs.build.outputs.version }}
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -uo pipefail
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::warning::AUR_SSH_KEY secret is not set - skipping AUR publish"
            exit 0
          fi
          # Reuse the stamped, smoke-tested PKGBUILD from the step above; it is
          # exactly what should land on the AUR. Push as the builder user so
          # makepkg (root-averse) can regenerate .SRCINFO in the same tree.
          install -d -m 700 /home/builder/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > /home/builder/.ssh/id_aur
          chmod 600 /home/builder/.ssh/id_aur
          {
            echo 'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN'
            echo 'aur.archlinux.org ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBLMiLrP8pVi5BFX2i3vepSUnpedeiewE5XptnUnau+ZoeUOPkpoCgZZuYfpaIQfhhJJI5qgnjJmr4hyJbe/zxow='
            echo 'aur.archlinux.org ssh-rsa '
          } > /home/builder/.ssh/known_hosts
          chown -R builder:builder /home/builder/.ssh
          if sudo -u builder env HOME=/home/builder VER="$VER" bash -c '
            set -e
            export GIT_SSH_COMMAND="ssh -i /home/builder/.ssh/id_aur -o IdentitiesOnly=yes -o UserKnownHostsFile=/home/builder/.ssh/known_hosts"
            git config --global user.name "NC1107"
            git config --global user.email "nickpconn@gmail.com"
            rm -rf /tmp/aur
            git clone ssh://aur@aur.archlinux.org/sink-bin.git /tmp/aur
            cp /build/PKGBUILD /tmp/aur/PKGBUILD
            cd /tmp/aur
            makepkg --printsrcinfo > .SRCINFO
            git add PKGBUILD .SRCINFO
            if git diff --cached --quiet; then
              echo "AUR already current for sink-bin ${VER}, nothing to push"
              exit 0
            fi
            git commit -m "upgpkg: sink-bin ${VER}-1"
            git push
          '; then
            echo "sink-bin ${VER} published to the AUR"
          else
            echo "::warning::AUR publish failed for sink-bin ${VER}. The .pkg.tar.zst is on the release; push packaging/arch/PKGBUILD to ssh://aur@aur.archlinux.org/sink-bin.git manually."
          fi

  copr:
    name: Fedora COPR
    # Stable releases only - never the rolling dev prerelease. Best effort:
    # the .rpm is already on the release, so a COPR failure only warns.
    needs: build
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-24.04
    container: fedora:latest
    steps:
      - name: Install tooling
        run: dnf -y install git copr-cli rpm-build rpmdevtools binutils tar gzip >/dev/null

      - uses: actions/checkout@v7

      - name: Publish sink to COPR
        env:
          VER: ${{ needs.build.outputs.version }}
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -uo pipefail
          if [ -z "${COPR_CONFIG:-}" ]; then
            echo "::warning::COPR_CONFIG secret is not set - skipping COPR publish"
            exit 0
          fi
          mkdir -p ~/.config
          printf '%s\n' "$COPR_CONFIG" > ~/.config/copr
          chmod 600 ~/.config/copr
          rpmdev-setuptree
          # Stamp the release version into the repo spec, then embed the release
          # .deb into the SRPM here (COPR's build root has no network, so the
          # source must travel inside the SRPM).
          cp packaging/fedora/sink.spec ~/rpmbuild/SPECS/sink.spec
          sed -i "s/^Version:.*/Version:        ${VER}/" ~/rpmbuild/SPECS/sink.spec
          spectool -g -R ~/rpmbuild/SPECS/sink.spec
          rpmbuild -bs ~/rpmbuild/SPECS/sink.spec >/dev/null
          srpm=$(ls ~/rpmbuild/SRPMS/sink-*.src.rpm)
          if copr-cli build nc1107/sink "$srpm" --nowait; then
            echo "submitted sink ${VER} to COPR (nc1107/sink)"
          else
            echo "::warning::COPR submit failed for sink ${VER}. The .rpm is on the release; rebuild manually with 'copr-cli build nc1107/sink <srpm>' from packaging/fedora/sink.spec."
          fi
