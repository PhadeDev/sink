name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - ".gitignore"
  workflow_dispatch:

# One release at a time so two pushes can't compute the same version.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    # 24.04: PipeWire 1.x headers (the native backend needs >= 0.3.49)
    # and webkit2gtk-4.1 for Tauri v2.
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history + tags for version computation

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpipewire-0.3-dev \
            clang \
            squashfs-tools \
            zstd \
            jq

      - name: Compute release version
        # The version in tauri.conf.json wins when it's ahead of the latest
        # tag (bump it for minor/major releases); otherwise the patch number
        # auto-increments from the latest tag on every push.
        id: ver
        run: |
          set -euo pipefail
          conf=$(jq -r .version src-tauri/tauri.conf.json)
          latest=$(git tag -l 'v*' --sort=-v:refname | head -1)
          latest=${latest#v}
          latest=${latest:-0.0.0}
          if [ "$conf" != "$latest" ] && \
             [ "$(printf '%s\n' "$latest" "$conf" | sort -V | tail -1)" = "$conf" ]; then
            ver="$conf"
          else
            IFS=. read -r major minor patch <<< "$latest"
            ver="$major.$minor.$((patch + 1))"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Releasing v$ver (conf=$conf, latest tag=v$latest)"

      - name: Stamp version into the build
        run: |
          set -euo pipefail
          ver="${{ steps.ver.outputs.version }}"
          jq --arg v "$ver" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          npm pkg set version="$ver"

      - run: npm ci

      - name: Build bundles
        run: npm run tauri build

      - name: Repack AppImage against system PipeWire
        # linuxdeploy bundles the build machine's libpipewire, which has
        # its SPA plugin directory baked in at the distro's path — on any
        # other distro it can't load support.system and the native backend
        # dies. PipeWire is a hard runtime requirement anyway, so strip the
        # bundled copy and let the loader use the system library.
        run: |
          set -euo pipefail
          # The cargo target dir lives at the repo root in this workspace.
          cd "$(dirname "$(find target -path '*/release/bundle/appimage/sink_*.AppImage' | head -1)")"
          app=$(ls sink_*.AppImage)
          ./"$app" --appimage-extract > /dev/null
          rm -fv squashfs-root/usr/lib/libpipewire-0.3.so*
          offset=$(./"$app" --appimage-offset)
          head -c "$offset" "$app" > runtime
          mksquashfs squashfs-root payload.squashfs -root-owned -noappend -quiet -comp zstd
          cat runtime payload.squashfs > "$app"
          chmod +x "$app"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.version }}"
          gh release create "$tag" --target "$GITHUB_SHA" --title "Sink $tag" \
            --generate-notes --notes "Linux builds:
          - **AppImage** — portable, run anywhere (\`chmod +x\` and go)
          - **.deb** — Debian / Ubuntu and derivatives
          - **.rpm** — Fedora / openSUSE and derivatives

          Requires PipeWire with \`pipewire-pulse\` and WirePlumber 0.5+."
          gh release upload "$tag" --clobber \
            target/release/bundle/appimage/sink_*.AppImage \
            target/release/bundle/deb/*.deb \
            target/release/bundle/rpm/*.rpm

  archpkg:
    name: Arch package
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    # makepkg only runs on Arch, so build the pacman package in an Arch
    # container and attach the .pkg.tar.zst to the release. Users install it
    # with `sudo pacman -U`, the same way the .rpm/.deb are installed.
    container: archlinux:latest
    steps:
      - name: Install build tooling
        run: pacman -Syu --noconfirm --needed base-devel git github-cli

      - uses: actions/checkout@v5

      - name: Build and attach sink-bin
        env:
          VER: ${{ needs.build.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # makepkg refuses to run as root; build as an unprivileged user.
          useradd -m builder
          install -d -o builder /build
          deb="sink_${VER}_amd64.deb"
          # Fetch the exact .deb just attached to the release and pin its
          # real checksum so makepkg validates the bytes users will get.
          gh release download "v${VER}" --repo "$GITHUB_REPOSITORY" --pattern "$deb" --dir /build
          sum=$(sha256sum "/build/$deb" | cut -d' ' -f1)
          cp packaging/arch/PKGBUILD /build/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VER}/; s/^sha256sums=.*/sha256sums=('${sum}')/" /build/PKGBUILD
          chown -R builder:builder /build
          # --nodeps: this only repackages a prebuilt binary, so the runtime
          # deps don't need to be installed in the build container.
          sudo -u builder bash -lc 'cd /build && makepkg --noconfirm --nodeps'
          pkg=$(ls /build/sink-bin-*-x86_64.pkg.tar.zst)
          echo "Built: $pkg"
          gh release upload "v${VER}" --clobber "$pkg"
